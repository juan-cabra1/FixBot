services:
  backend:
    build: ./backend
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://fixbot:fixbot@postgres:5432/fixbot
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fixbot
      POSTGRES_USER: fixbot
      POSTGRES_PASSWORD: fixbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
